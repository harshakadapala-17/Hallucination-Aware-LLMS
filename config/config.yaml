model:
  provider: "ollama"              # "ollama" (local, free) — no API key needed
  name: "llama3.2"               # lightweight model (~2GB), good speed/quality balance
  temperature: 0.0
  max_tokens: 256
  ollama_base_url: "http://localhost:11434"

strategy:
  thresholds:
    low: 0.20   # lowered: model underestimates risk, push more queries to RAG
    high: 0.50  # lowered: reach rag_verification sooner
  high_risk_types:
    - "citation"
    - "entity"
    - "relation"
    - "temporal"
    - "reasoning"

rag:
  top_k: 3
  chunk_size: 200
  chunk_overlap: 50
  index_path: "data/faiss_index"
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  use_hyde: false                 # HyDE via Ollama — set true to enable

  # ── Advanced Retrieval ────────────────────────────────────────────────
  use_reranking: true             # cross-encoder re-ranking after retrieval
  reranking_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"

  use_query_decomposition: true   # decompose complex queries into sub-questions
  use_contextual_compression: true  # extract only relevant sentences per doc
  compression_threshold: 0.4     # cosine-sim threshold for sentence selection

  use_adaptive_topk: true         # vary top_k by query complexity
  adaptive_topk:
    low: 2                        # complexity < 0.3
    medium: 3                     # complexity 0.3 – 0.7
    high: 5                       # complexity > 0.7

  min_retrieval_confidence: 0.3   # fall back to direct_llm when below this
  max_agent_iterations: 2         # max retrieval-generation cycles in agent loop

predictor:
  model_type: "logistic_regression"   # or "xgboost"
  model_path: "data/predictor.pkl"
  type_model_path: "data/type_classifier.pkl"
  test_size: 0.2
  random_seed: 42

  # ── Hybrid self-consistency scoring ─────────────────────────────────
  use_self_consistency: true          # blend feature + self-consistency scores
  self_consistency_threshold: 0.3    # only trigger when complexity > this
  self_consistency_samples: 3        # number of Ollama samples (temperatures vary)
  self_consistency_weight: 0.6       # weight given to inconsistency_score
  feature_weight: 0.4                # weight given to feature-based risk_score

labeling:
  entity_sim_threshold: 0.85
  llm_judge_model: "llama3.2"

verification:
  sim_threshold_supported: 0.65   # used only when use_nli_entailment: false
  sim_threshold_refuted: 0.40     # used only when use_nli_entailment: false
  max_claims: 5
  use_nli_entailment: true        # uses cross-encoder/nli-deberta-v3-small
  nli_model: "cross-encoder/nli-deberta-v3-small"
  nli_entail_threshold: 0.6       # prob >= this → supported
  nli_contradict_threshold: 0.5   # prob >= this → refuted

data:
  truthfulqa_path: "data/truthfulqa.jsonl"
  fever_path: "data/fever.jsonl"
  labeled_dataset_path: "data/labeled_dataset.jsonl"

pipeline:
  max_regeneration_retries: 1   # re-generate once if verdict is 'refuted'

demo:
  port: 8501
  title: "Hallucination-Aware LLM System"
