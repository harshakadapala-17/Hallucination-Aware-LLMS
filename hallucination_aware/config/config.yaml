model:
  name: "gpt-3.5-turbo"
  temperature: 0.0
  max_tokens: 256

strategy:
  thresholds:
    low: 0.3
    high: 0.7
  high_risk_types:
    - "citation"
    - "entity"
    - "relation"
    - "temporal"
    - "reasoning"

rag:
  top_k: 3
  chunk_size: 200
  chunk_overlap: 50
  index_path: "data/faiss_index"
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"

predictor:
  model_type: "logistic_regression"   # or "xgboost"
  model_path: "data/predictor.pkl"
  type_model_path: "data/type_classifier.pkl"
  test_size: 0.2
  random_seed: 42

labeling:
  entity_sim_threshold: 0.85
  llm_judge_model: "gpt-3.5-turbo"

verification:
  sim_threshold_supported: 0.65
  sim_threshold_refuted: 0.40
  max_claims: 5
  use_llm_entailment: false

data:
  truthfulqa_path: "data/truthfulqa.jsonl"
  fever_path: "data/fever.jsonl"
  labeled_dataset_path: "data/labeled_dataset.jsonl"

demo:
  port: 8501
  title: "Hallucination-Aware LLM System"
